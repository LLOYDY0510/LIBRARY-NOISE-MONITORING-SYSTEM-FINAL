<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LibraryQuiet – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
  <style>
      *{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f172a 0%, #1a3050 50%, #0f172a 100%);
  overflow: hidden;
}

.bg-grid {
  position: fixed;
  inset: 0;
  opacity: .03;
  background-image:
    linear-gradient(#fff 1px, transparent 1px),
    linear-gradient(90deg, #fff 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
}

.bg-glow1 {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,.14), transparent 70%);
  top: -150px; left: -150px;
  pointer-events: none;
}

.bg-glow2 {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,.09), transparent 70%);
  bottom: -100px; right: -100px;
  pointer-events: none;
}

.bg-glow3 {
  position: fixed;
  width: 250px; height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,.07), transparent 70%);
  top: 50%; right: 10%;
  pointer-events: none;
}

.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  animation: float linear infinite;
}

@keyframes float {
  0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
}

.login-card {
  position: relative;
  width: 440px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 26px;
  padding: 44px;
  backdrop-filter: blur(28px);
  box-shadow:
    0 32px 80px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.08);
  animation: slideUp .7s cubic-bezier(.16,1,.3,1);
  z-index: 10;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 32px;
}

.logo-icon {
  width: 52px; height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 8px 28px rgba(59,130,246,.5);
}

.logo-name {
  color: #f1f5f9;
  font-weight: 800;
  font-size: 21px;
  letter-spacing: -.4px;
}

.logo-sub {
  color: #475569;
  font-size: 12px;
  margin-top: 3px;
}

.sys-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(16,185,129,.1);
  border: 1px solid rgba(16,185,129,.2);
  padding: 5px 13px;
  border-radius: 20px;
  margin-bottom: 18px;
}

.sys-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #10b981;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}

.sys-text {
  font-size: 11px;
  font-weight: 700;
  color: #6ee7b7;
  letter-spacing: .5px;
  text-transform: uppercase;
}


.login-title {
  color: #f1f5f9;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: -.4px;
}

.login-sub {
  color: #64748b;
  font-size: 13px;
  margin-bottom: 28px;
  line-height: 1.5;
}


.error-msg {
  display: none;
  background: rgba(239,68,68,.12);
  border: 1px solid rgba(239,68,68,.3);
  color: #fca5a5;
  font-size: 12px;
  font-weight: 600;
  padding: 11px 15px;
  border-radius: 11px;
  margin-bottom: 16px;
  align-items: center;
  gap: 8px;
}

.error-msg.show { display: flex; }


.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-label {
  display: block;
  color: #94a3b8;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .7px;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: #475569;
  pointer-events: none;
}

.form-input {
  width: 100%;
  padding: 13px 16px 13px 42px;
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 13px;
  color: #f1f5f9;
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  transition: all .25s;
}

.form-input:focus {
  border-color: #3b82f6;
  background: rgba(59,130,246,.1);
  box-shadow: 0 0 0 4px rgba(59,130,246,.15);
}

.form-input::placeholder { color: #334155; }

.form-input.shake { animation: shake .4s ease; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-8px); }
  40%       { transform: translateX(8px); }
  60%       { transform: translateX(-5px); }
  80%       { transform: translateX(5px); }
}


.toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #475569;
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  transition: color .2s;
}

.toggle-pw:hover { color: #94a3b8; }


.form-extras {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.remember-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.remember-check {
  width: 17px; height: 17px;
  border-radius: 5px;
  border: 1.5px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.05);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}

.remember-check.checked {
  background: #3b82f6;
  border-color: #3b82f6;
}

.remember-check.checked::after {
  content: '✓';
  color: #fff;
  font-size: 10px;
  font-weight: 700;
}

.remember-label {
  color: #94a3b8;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

.forgot-link {
  color: #3b82f6;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: color .2s;
  background: none;
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.forgot-link:hover { color: #60a5fa; }


.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border: none;
  border-radius: 13px;
  color: #fff;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all .25s;
  letter-spacing: .3px;
  box-shadow: 0 4px 18px rgba(59,130,246,.45);
  position: relative;
  overflow: hidden;
}

.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  opacity: 0;
  transition: opacity .2s;
}

.login-btn:hover::before      { opacity: 1; }
.login-btn:hover              { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,.6); }
.login-btn:active             { transform: translateY(0); }
.login-btn.loading            { opacity: .75; cursor: not-allowed; pointer-events: none; }


.btn-spinner {
  display: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  animation: spin .6s linear infinite;
  margin: 0 auto;
}

@keyframes spin { to { transform: rotate(360deg); } }

.btn-text { transition: opacity .2s; }


.demo-section {
  margin-top: 24px;
  padding-top: 22px;
  border-top: 1px solid rgba(255,255,255,.07);
}

.demo-label {
  text-align: center;
  color: #475569;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-bottom: 12px;
}

.demo-chips { display: flex; gap: 10px; }

.demo-chip {
  flex: 1;
  padding: 11px 10px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 13px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}

.demo-chip:hover  { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); transform: translateY(-1px); }
.demo-chip:active { transform: translateY(0); }

.chip-icon  { font-size: 18px; margin-bottom: 5px; }
.chip-role  { font-size: 12px; font-weight: 800; margin-bottom: 4px; }
.chip-email { font-size: 10px; color: #475569; font-family: 'JetBrains Mono', monospace; margin-bottom: 1px; }
.chip-pass  { font-size: 10px; color: #334155; font-family: 'JetBrains Mono', monospace; }


.success-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 16px;
}

.success-overlay.show { display: flex; animation: fadeIn .4s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.success-icon { font-size: 60px; animation: bounceIn .6s ease; }

@keyframes bounceIn {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.success-msg { color: #f1f5f9; font-size: 22px; font-weight: 800; }
.success-sub { color: #64748b; font-size: 14px; }

.success-bar {
  width: 200px; height: 4px;
  background: #1e293b;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}

.success-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #10b981);
  border-radius: 4px;
  animation: fillBar 2s ease forwards;
}

@keyframes fillBar { from { width: 0%; } to { width: 100%; } }

.login-footer {
  position: fixed;
  bottom: 20px;
  left: 0; right: 0;
  text-align: center;
  color: #1e293b;
  font-size: 11px;
}
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow1"></div>
  <div class="bg-glow2"></div>
  <div class="bg-glow3"></div>
  <div class="particles" id="particles"></div>

  <div class="success-overlay" id="success-overlay" style="display:none;">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <div class="success-name" id="success-name">Welcome!</div>
      <div class="success-role" id="success-role">Administrator</div>
      <div class="success-sub">Redirecting to your dashboard...</div>
      <div class="success-bar"><div class="success-bar-fill" id="progress-bar"></div></div>
    </div>
  </div>


  <div class="login-card" id="login-card">

    <div class="logo-wrap">
      <div class="logo-icon">📡</div>
      <div>
        <div class="logo-name">LibraryQuiet</div>
        <div class="logo-sub">Noise Monitoring System</div>
      </div>
    </div>

    <div class="sys-badge">
      <span class="sys-dot"></span>
      <span class="sys-text">System Online</span>
    </div>

    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to access the monitoring dashboard</div>

   
    <div class="error-msg" id="error-msg" style="display:none;">
      <span>⚠️</span>
      <span id="error-text">Invalid email or password.</span>
    </div>

  
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input class="form-input" id="email" type="email" placeholder="Enter your email address" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-pw" id="toggle-pw" onclick="togglePassword()" type="button">👁</button>
      </div>
    </div>

    <div class="form-extras">
      <label class="remember-wrap">
        <input type="checkbox" id="remember" style="display:none;" onchange="toggleRemember()"/>
        <div class="remember-check" id="remember-check" onclick="document.getElementById('remember').click()"></div>
        <span class="remember-label">Remember me</span>
      </label>
      <button class="forgot-link" onclick="forgotPassword()" type="button">Forgot password?</button>
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()" type="button">
      <span class="btn-text" id="btn-text">Sign In →</span>
    </button>

    <div class="login-footer">
      <span class="login-time" id="login-time"></span>
      <span>LibraryQuiet v1.0 © 2025</span>
    </div>

  </div>

  <script src="app-data.js"></script>
  <script src="log.js"></script>
</body>
</html>
